defaults:
  - runtime
  - _self_

model:
  hidden_size: 32
  optim:
    lr: 0.001
    weight_decay: 0.01

data:
  dataset: toy-text
  subset: 1.0
  bucket: short

train:
  epochs: 3
  steps_per_epoch: 100

forge:
  store: null   # defaults to ./outputs relative to cwd; set to an absolute path to share a store across projects
  tags: null
  verbose: true
  exclude:
    - train.steps_per_epoch
